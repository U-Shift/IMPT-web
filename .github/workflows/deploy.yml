name: Deploy Dashboard to GitHub Pages

on:
  push:
    branches:
      - main  # Trigger on pushes to the main branch
  workflow_dispatch: # Allow manual triggers

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Download Data Files 📥
        run: |
          mkdir -p dashboard/public/data
          curl -L https://github.com/U-Shift/IMPT-data/releases/download/1.0/municipios_aggregated.geojson -o dashboard/public/data/municipios_aggregated.geojson
          curl -L https://github.com/U-Shift/IMPT-data/releases/download/1.0/freguesias_aggregated.geojson -o dashboard/public/data/freguesias_aggregated.geojson
          curl -L https://github.com/U-Shift/IMPT-data/releases/download/1.0/grid_aggregated.geojson -o dashboard/public/data/grid_aggregated.geojson

      - name: Install and Build 🏗️
        run: |
          cd dashboard
          npm ci
          npm run build

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dashboard/dist # The folder the action should deploy.
          branch: gh-pages # The branch the action should deploy to.
